# tmux-status: 3-line status bar overlay
# https://github.com/mikeydotio/tmux-status
#
# This file is sourced from the user's tmux.conf. It ONLY sets status-bar
# options — keybindings, prefix, mouse, terminal, and other preferences
# are left to the user's own config.

# ── Dynamic settings (clock format, etc.) ──────────────────────
run-shell '~/.local/bin/tmux-status-apply-config'

# ── Status bar structure ───────────────────────────────────────
# Three lines: Claude info (top), git/path (middle), windows+clock (bottom)
set -g status 3
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=terminal,fg=colour7'

# Line 0 (top): Claude Code session info — empty when pane isn't running Claude
set -g status-format[0] '#[align=left]#(~/.local/bin/tmux-claude-status "#{pane_pid}")'

# Line 1 (middle): filesystem path and git info for the active pane
set -g status-format[1] '#[align=left,fg=colour7] #(~/.local/bin/tmux-git-status "#{pane_current_path}")'

# Line 2 (bottom): standard tmux status bar layout (status-left, windows, status-right)
# This is the default status-format[0] relocated to line 2 so the standard
# status-left / window-list / status-right rendering appears on the bottom line.
set -g status-format[2] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

# ── Status-left: hostname ──────────────────────────────────────
set -g status-left ' #[fg=colour4]#{host_short}#[fg=colour8]:#[default] '
set -g status-left-length 30

# ── Status-right: clock (format applied by tmux-status-apply-config) ──
# Fallback in case apply-config hasn't run yet
set -g status-right '#[fg=colour4]「#[fg=colour7]%-l:%M#[fg=colour4]」'
set -g status-right-length 10

# ── Window tab styling ─────────────────────────────────────────
# Blue vertical borders for all tabs; active tab is bold + bright.
# Activity flag turns the window name yellow for unseen output.
set -g window-status-style 'bg=terminal'
set -g window-status-activity-style 'none'
set -g window-status-current-style 'bg=terminal'
set -g window-status-format '#[bg=terminal,fg=colour4]│#{?window_activity_flag,#[fg=colour3],#[fg=colour7]}#{window_name}#[fg=colour4]│'
set -g window-status-current-format '#[bg=terminal,fg=colour12,bold]┃#[fg=colour15]#{window_name}#[fg=colour12]┃'
set -g window-status-separator ' '

# ── Activity monitoring ────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off

# ── Automatic window naming ────────────────────────────────────
# Shows ✧ prefix when a Claude Code session is detected in the pane
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{m:*claude*,#{pane_current_command}},✧ #{b:pane_current_path},#{pane_current_command}}'
