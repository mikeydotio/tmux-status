# tmux-status settings
# https://github.com/mikeydotio/tmux-status
#
# After editing, reload tmux config to apply changes:
#   tmux source-file ~/.config/tmux/tmux.conf
# or:
#   tmux source-file ~/.tmux.conf

# Use 24-hour clock format (default: false → 12-hour with am/pm)
CLOCK_24H=false

# Show a bold hostname banner at the top of each pane using double-line
# box-drawing characters:  ═══╣ HOSTNAME ╠═══
# Uses pane-border-status, so this also sets pane-border-style. (default: true)
SHOW_TOP_BANNER=true

# Banner and pane border color (256-color code, default: 208 = orange).
# Only applies when SHOW_TOP_BANNER=true.
# TOP_BANNER_COLOR=208

# URL of the quota data server. Default: localhost server installed with tmux-status.
QUOTA_SOURCE=http://127.0.0.1:7850

# API key for authenticating with the quota server (optional).
# QUOTA_API_KEY=

# Cache TTL in seconds. 0 = always fetch (good for localhost). 30 = recommended for remote.
QUOTA_CACHE_TTL=0

# --- Deprecated settings (kept for backward compatibility) ---

# DEPRECATED: Use the server's --interval flag instead.
# How often (in seconds) the quota poller fetches fresh data from claude.ai
# (default: 300, minimum: 30). Set to 0 to disable polling.
# Only applies when tmux-status-quota-poll is running.
# QUOTA_REFRESH_PERIOD=300

# DEPRECATED: Hardcoded internally; still honored if set.
# Path to the quota data bridge file. Both tmux-status-quota-fetch (writer) and
# tmux-claude-status (reader) use this path. (default: ~/.cache/tmux-status/claude-quota.json)
# QUOTA_DATA_PATH=~/.cache/tmux-status/claude-quota.json
