# tmux-status settings
# https://github.com/mikeydotio/tmux-status
#
# After editing, reload tmux config to apply changes:
#   tmux source-file ~/.config/tmux/tmux.conf
# or:
#   tmux source-file ~/.tmux.conf

# Use 24-hour clock format (default: false → 12-hour with am/pm)
CLOCK_24H=false

# How often (in seconds) the quota poller fetches fresh data from claude.ai
# (default: 300, minimum: 30). Only applies when tmux-status-quota-poll is running.
# QUOTA_REFRESH=300
